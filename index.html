<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopLite</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAVBAR-->
    <header class="header">
      <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">ShopLite</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarResponsive"
            aria-controls="navbarResponsive"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link active" href="#">Trang chủ</a>
              </li>
              <li class="nav-item">
                <a class="nav-link position-relative" href="cart.html">
                  <i class="bi bi-cart"></i>

                  Cart

                  <span
                    id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  >
                    0
                  </span>
                </a>
              </li>
            </ul>

            <div class="navbar-nav">
              <a class="nav-link" href="register.html">Register</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero-section py-5 bg-primary text-white">
      <div class="container text-center">
        <h1 class="display-4 fw-bold">Discover Amazing Products</h1>

        <p class="lead">Find the best deals from our collection</p>

        <a href="#product-list" class="btn btn-light btn-lg"> Shop Now </a>
      </div>
    </section>

    <!-- FILTER BAR-->
    <section class="container my-4">
      <div class="row g-3">
        <div class="col-md-5">
          <input
            id="search-input"
            type="text"
            class="form-control"
            placeholder="Search products..."
          />
        </div>

        <div class="col-md-3">
          <select id="category-filter" class="form-select">
            <option value="all">All Categories</option>
          </select>
        </div>

        <div class="col-md-4">
          <select id="sort-select" class="form-select">
            <option value="">Sort By</option>

            <option value="price-asc">Price Low → High</option>

            <option value="price-desc">Price High → Low</option>

            <option value="title">Name A-Z</option>
          </select>
        </div>
      </div>
    </section>

    <!-- LOADING -->

    <!-- PRODUCT GRID -->
    <main class="container py-4">
      <div id="product-list" class="row g-4"></div>
      <nav class="mt-5" aria-label="Product pagination">
        <ul id="pagination" class="pagination justify-content-center"></ul>
      </nav>
    </main>

    <!-- FOOTER-->
    <footer class="bg-dark text-white text-center py-4 mt-5">
      <div class="container">
        <p class="mb-0">© 2026 ShopLite</p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/home.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
