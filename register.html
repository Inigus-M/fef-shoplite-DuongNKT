<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">ShopLite</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarResponsive"
            aria-controls="navbarResponsive"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">Trang chủ</a>
              </li>
              <li class="nav-item">
                <a class="nav-link position-relative" href="cart.html">
                  <i class="bi bi-cart"></i>

                  Cart

                  <span
                    id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  >
                    0
                  </span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow">
            <div class="card-body">
              <h2 class="mb-4 text-center">Register Form</h2>

              <form id="register-form">
                <!-- Full Name -->
                <div class="mb-3">
                  <label class="form-label"> Full Name </label>

                  <input type="text" id="full-name" class="form-control" />

                  <small id="name-error" class="text-danger"></small>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label"> Email </label>

                  <input type="text" id="email" class="form-control" />

                  <small id="email-error" class="text-danger"></small>
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label"> Password </label>

                  <input type="password" id="password" class="form-control" />

                  <small id="password-error" class="text-danger"></small>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                  <label class="form-label"> Phone Number </label>

                  <input type="text" id="phone" class="form-control" />

                  <small id="phone-error" class="text-danger"></small>
                </div>

                <!-- Select -->
                <div class="mb-3">
                  <label class="form-label"> Country </label>

                  <select id="country" class="form-select">
                    <option value="">Select Country</option>

                    <option value="Vietnam">Vietnam</option>

                    <option value="Japan">Japan</option>

                    <option value="USA">USA</option>
                  </select>

                  <small id="country-error" class="text-danger"></small>
                </div>

                <!-- Checkbox -->
                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" id="agree" />

                  <label class="form-check-label"> I agree to the terms </label>

                  <br />

                  <small id="agree-error" class="text-danger"></small>
                </div>

                <button
                  type="submit"
                  id="submit-btn"
                  class="btn btn-primary w-100"
                  disabled
                >
                  Register
                </button>
              </form>

              <div id="success-message" class="alert alert-success mt-3 d-none">
                Registration successful!
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <footer class="bg-dark text-light text-center py-4 mt-5">
      <p class="mb-0">© 2026 ShopLite</p>
    </footer>
  </body>
</html>
